services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  schema-registry:
    image: confluentinc/cp-schema-registry:7.4.0
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "9000:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CLUSTERS_0_SCHEMA_REGISTRY_URL: http://schema-registry:8081
    depends_on:
      - kafka
      - schema-registry

  openbao:
    image: openbao/openbao:latest
    container_name: openbao
    ports:
      - "8200:8200"
    environment:
      BAO_DEV_ROOT_TOKEN_ID: root
      BAO_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      BAO_ADDR: http://127.0.0.1:8200
      BAO_TOKEN: root
    cap_add:
      - IPC_LOCK
    command: >-
      /bin/sh -c "
      bao server -dev &
      until wget -qO- http://127.0.0.1:8200/v1/sys/health >/dev/null 2>&1; do sleep 1; done;
      echo 'Initializing OpenBao secret store';
      export BAO_ADDR=http://127.0.0.1:8200; export BAO_TOKEN=root; 
      bao kv put secret/smtp SMTP_HOST=${SMTP_HOST:-smtp.gmail.com} SMTP_PORT=${SMTP_PORT:-587} SMTP_USER=${SMTP_USER:-demo@example.com} SMTP_PASSWORD=${SMTP_PASSWORD:-demo-password} SMTP_FROM=${SMTP_FROM:-demo@example.com};
      wait"

  twofa:
    build:
      context: .
      dockerfile: Dockerfile.twofa
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - twofa-data:/app/data
    environment:
      DATABASE_URL: sqlite:////app/data/twofa.db
      OPENBAO_ADDR: http://openbao:8200
      OPENBAO_TOKEN: root
    depends_on:
      - openbao

  employee-mgmt:
    build:
      context: ./employee-mgmt
    ports:
      - "8080:8080"
    environment:
      TWOFA_BASE_URL: http://twofa:8000
      SPRING_DATASOURCE_URL: jdbc:sqlite:/data/employees.db
      KAFKA_BOOTSTRAP: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    volumes:
      - employee-data:/data
    depends_on:
      - twofa
      - kafka
      - schema-registry

  gitleaks:
    image: zricethezav/gitleaks:latest
    command: ["detect", "--path", "/repo", "--report-format", "json", "--report-path", "/reports/gitleaks-report.json"]
    volumes:
      - ./:/repo:ro
      - gitleaks-reports:/reports
    restart: "no"

volumes:
  twofa-data:
  employee-data:
  gitleaks-reports:
