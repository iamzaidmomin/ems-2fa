<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Management</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="login-view" class="container login-card">
    <div class="card">
      <h1>Employee Portal</h1>
      <p class="subtitle">Sign in with email OTP (2FA)</p>
      <div id="login-message"></div>

      <div id="step-email">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@company.com" autocomplete="email">
        <button class="btn btn-primary" id="send-otp-btn" style="width:100%">Send OTP</button>
      </div>

      <div id="step-otp" class="hidden">
        <label for="otp">Enter OTP</label>
        <input type="text" id="otp" placeholder="6-digit code" maxlength="10" inputmode="numeric" autocomplete="one-time-code">
        <div class="actions">
          <button class="btn btn-primary" id="verify-otp-btn">Verify &amp; Sign In</button>
          <button class="btn btn-secondary" id="back-btn">Back</button>
        </div>
      </div>
    </div>
  </div>

  <div id="app-view" class="container hidden">
    <header>
      <h1>Employees</h1>
      <div class="user-bar">
        <span id="user-email"></span>
        <button class="btn btn-secondary btn-sm" id="logout-btn">Logout</button>
      </div>
    </header>

    <div id="app-message"></div>

    <div class="card" style="margin-bottom:1.5rem">
      <h2 class="section-title" id="form-title">Add Employee</h2>
      <form id="employee-form">
        <input type="hidden" id="employee-id">
        <div class="form-grid">
          <div>
            <label for="name">Name</label>
            <input type="text" id="name" required>
          </div>
          <div>
            <label for="emp-email">Email</label>
            <input type="email" id="emp-email" required>
          </div>
          <div>
            <label for="department">Department</label>
            <input type="text" id="department" required>
          </div>
          <div>
            <label for="position">Position</label>
            <input type="text" id="position" required>
          </div>
        </div>
        <div class="actions">
          <button type="submit" class="btn btn-primary" id="save-btn">Save</button>
          <button type="button" class="btn btn-secondary hidden" id="cancel-btn">Cancel</button>
        </div>
      </form>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Department</th>
            <th>Position</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="employee-table"></tbody>
      </table>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
